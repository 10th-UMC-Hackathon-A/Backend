name: Spring Boot CI Test

on:
  push:
    branches:
      - ci/github-actions-deploy

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # GitHub 저장소의 코드를 Actions 실행 환경으로 가져온다.
      - name: Checkout repository
        uses: actions/checkout@v6

      # 프로젝트에서 사용하는 Java 21을 설치한다.
      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      # Gradle 환경과 의존성 캐시를 설정한다.
      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # Windows에서 만든 gradlew는 Linux 실행 권한이 없을 수 있다.
      - name: Grant execute permission
        run: chmod +x gradlew

      # Spring Boot 실행 JAR를 빌드한다.
      - name: Build Spring Boot JAR
        run: ./gradlew clean bootJar -x test